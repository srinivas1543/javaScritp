<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login form</h1>
    <form action="">
        <input id="usernameInput" type="text" name="username" placeholder="username"> <br><br>
        <input id="passwordInput" type="password" name="password" placeholder="password"> <br><br>
        <button>Submit</button>
    </form>
    <script>
        let usernameInput = document.getElementById("usernameInput");
        let passwordInput = document.getElementById("passwordInput");
        document.forms[0].addEventListener("submit",(e)=>{
            e.preventDefault();
            let lusername = localStorage.getItem("username");
            let lpassword = localStorage.getItem("password");
            let username = usernameInput.value;
            let password = passwordInput.value;
            if(lusername === username && lpassword === password){
                location.href = "./welcome.html"
            }
            else{
                alert("invalid credentials")
            }
        })
    </script>
</body>
</html>
